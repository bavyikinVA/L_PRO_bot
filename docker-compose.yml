services:
  db:
    image: postgres:16
    container_name: l_pro_bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: l_pro_bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.1.2
    container_name: lpro-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: lpro-kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: lpro-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: l_pro_bot-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./static:/app/static
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend/lpro-frontend
      dockerfile: Dockerfile
    container_name: l_pro_bot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: l_pro_bot-celery_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./static:/app/static
    command: celery -A celery_app.app worker --loglevel=info --concurrency=2
    networks:
      - app-network

  outbox_publisher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: l_pro_bot-outbox-publisher
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./static:/app/static
    command: python -m workers.outbox_publisher
    networks:
      - app-network

  notification_consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: l_pro_bot-notification-consumer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./static:/app/static
    command: python -m consumers.notification_consumer
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  app-network:
    driver: bridge