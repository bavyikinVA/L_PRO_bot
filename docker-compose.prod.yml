services:
  db:
    image: postgres:16
    container_name: l_pro_bot-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: l_pro_bot-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: l_pro_bot-app-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      PYTHONPATH: /app
    expose:
      - "8000"
    volumes:
      - ./static:/app/static
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    networks:
      - app-network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: l_pro_bot-celery-worker-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    env_file:
      - .env.prod
    environment:
      PYTHONPATH: /app
    volumes:
      - ./static:/app/static
    command: celery -A celery_app.app worker --loglevel=info --concurrency=2
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend/lpro-frontend
      dockerfile: Dockerfile
    container_name: l_pro_bot-frontend-prod
    restart: always
    depends_on:
      - app
    expose:
      - "3000"
    networks:
      - app-network

  caddy:
    image: caddy:2
    container_name: l_pro_bot-caddy-prod
    restart: always
    depends_on:
      - frontend
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_prod:/data
      - caddy_config_prod:/config
    networks:
      - app-network

volumes:
  postgres_data_prod:
  redis_data_prod:
  caddy_data_prod:
  caddy_config_prod:

networks:
  app-network:
    driver: bridge